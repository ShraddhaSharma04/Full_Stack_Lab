<!DOCTYPE html>
<html>
<head>
    <title>CSS Text, Font and Color Features</title>

    <style>
        body {
            background-color: lightyellow; /* Background Color */
        }

        h1 {
            color: darkblue;              /* Color */
            text-align: center;           /* Text Align */
            font-family: Arial;           /* Font Family */
        }

        p {
            color: brown;                 /* Color */
            font-family: Verdana;         /* Font Family */
            font-size: 18px;              /* Font Size */
            font-style: italic;           /* Font Style */
            font-weight: bold;            /* Font Weight */
            text-align: justify;          /* Text Align */
            text-decoration: underline;   /* Text Decoration */
        }
    </style>
</head>

<body>

    <h1>CSS Text and Font Example</h1>

    <p>
        This webpage shows different CSS text, font and color features.
        All styles are applied using internal CSS.
    </p>

</body>
</html>
