<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Types</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: purple;
            text-align: center;
        }

        p.internal {
            color: saddlebrown;
            font-size: 18px;
        }

        /* External CSS written here (since single file) */
        h3 {
            color: orange;
            text-align: center;
        }

        p.external {
            color: brown;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: olive; text-align: center;">
        Inline CSS Example
    </h1>

    <p style="color: brown; font-size: 20px;">
        This paragraph is styled using Inline CSS.
    </p>

    <!-- Internal CSS -->
    <h2>Internal CSS Example</h2>
    <p class="internal">
        This paragraph is styled using Internal CSS.
    </p>

    <!-- External CSS (written in same file for demo) -->
    <h3>External CSS Example</h3>
    <p class="external">
        This paragraph is styled using External CSS.
    </p>

</body>
</html>
