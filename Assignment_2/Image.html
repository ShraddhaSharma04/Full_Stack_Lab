<!DOCTYPE html>
<html>
<head>
    <title>Images and Links with CSS</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        img {
            width: 300px;              /* Image Size */
            border: 3px solid black;   /* Image Border */
            margin: 20px;
        }

        a {
            display: block;
            margin: 10px;
            color: blue;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            color: red;                /* Hover Effect */
            text-decoration: underline;
        }

        .section {
            margin: 40px;
        }
    </style>
</head>

<body>

<h1>Images and Links Example</h1>

<!-- Image -->
<div class="section">
    <h2>Sample Image</h2>
    <img src="https://via.placeholder.com/300" alt="Sample Image">
</div>

<!-- External Links -->
<div class="section">
    <h2>External Links</h2>
    <a href="https://www.google.com" target="_blank">Go to Google</a>
    <a href="https://www.wikipedia.org" target="_blank">Go to Wikipedia</a>
</div>

<!-- Internal Links -->
<div class="section">
    <h2>Internal Links</h2>
    <a href="#about">Go to About Section</a>
</div>

<!-- Internal Page Section -->
<div class="section" id="about">
    <h2>About Section</h2>
    <p>This is an internal page section link example.</p>
</div>

</body>
</html>
