<!DOCTYPE html>
<html>
<head>
    <title>Student Details Table</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;   /* Border proper join */
        }

        th, td {
            border: 1px solid black;     /* Add Borders */
            padding: 10px;               /* Add Spacing */
            text-align: center;          /* Align Text */
        }

        th {
            background-color: lightblue; /* Header Background Color */
        }

        h2 {
            text-align: center;
        }
    </style>

</head>

<body>

<h2>Student Details</h2>

<table>
    <tr>
        <th>Roll Number</th>
        <th>Name</th>
        <th>Course</th>
        <th>Semester</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Rahul</td>
        <td>BCA</td>
        <td>3</td>
    </tr>

    <tr>
        <td>102</td>
        <td>Priya</td>
        <td>BBA</td>
        <td>2</td>
    </tr>

    <tr>
        <td>103</td>
        <td>Aman</td>
        <td>B.Tech</td>
        <td>4</td>
    </tr>
</table>

</body>
</html>
