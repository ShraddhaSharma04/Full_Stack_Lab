<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Content Analyzer</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .container {
      width: 70%;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 5px;
      margin-top: 8px;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1a252f;
    }

    .message {
      display: none;
      padding: 12px;
      margin-top: 15px;
      border-radius: 5px;
      font-weight: bold;
    }

    .success {
      background: #e8ffe8;
      color: #006400;
      border: 1px solid #77cc77;
    }

    .error {
      background: #ffecec;
      color: #b30000;
      border: 1px solid #ff9999;
    }

    .result-box {
      display: none;
      margin-top: 25px;
      background: #fafafa;
      padding: 20px;
      border-left: 5px solid #2c3e50;
      border-radius: 8px;
    }

    .result-box p {
      font-size: 17px;
      color: #333;
    }

    .result-box strong {
      color: #2c3e50;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>File Content Analyzer</h2>

    <form id="uploadForm" enctype="multipart/form-data">
      <label>Select Text File</label>
      <input type="file" id="textFile" name="textFile" accept=".txt">

      <button type="submit">Analyze File</button>
    </form>

    <div id="messageBox" class="message"></div>

    <div id="resultBox" class="result-box">
      <h3>Analysis Result</h3>
      <p><strong>Number of Words:</strong> <span id="wordCount"></span></p>
      <p><strong>Number of Lines:</strong> <span id="lineCount"></span></p>
      <p><strong>Most Frequent Word:</strong> <span id="frequentWord"></span></p>
    </div>
  </div>

  <script>
    $(document).ready(function () {

      $("#uploadForm").submit(function (e) {
        e.preventDefault();

        let fileInput = $("#textFile")[0];

        if (fileInput.files.length === 0) {
          showMessage("Please select a text file.", "error");
          $("#resultBox").hide();
          return;
        }

        let file = fileInput.files[0];

        if (file.type !== "text/plain" && !file.name.endsWith(".txt")) {
          showMessage("Invalid file type. Please upload only .txt file.", "error");
          $("#resultBox").hide();
          return;
        }

        let formData = new FormData();
        formData.append("textFile", file);

        $.ajax({
          url: "analyze_file.php",
          method: "POST",
          data: formData,
          dataType: "json",
          contentType: false,
          processData: false,

          success: function (response) {
            if (response.status === "success") {
              showMessage(response.message, "success");

              $("#wordCount").text(response.word_count);
              $("#lineCount").text(response.line_count);
              $("#frequentWord").text(response.most_frequent_word);

              $("#resultBox").show();
              $("#uploadForm")[0].reset();
            } else {
              showMessage(response.message, "error");
              $("#resultBox").hide();
            }
          },

          error: function () {
            showMessage("AJAX error while uploading file.", "error");
            $("#resultBox").hide();
          }
        });
      });

    });

    function showMessage(message, type) {
      $("#messageBox")
        .removeClass("success error")
        .addClass(type)
        .text(message)
        .fadeIn();

      setTimeout(function () {
        $("#messageBox").fadeOut();
      }, 3000);
    }
  </script>

</body>
</html>
