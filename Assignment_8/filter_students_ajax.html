<!DOCTYPE html>
<html>
<head>
    <title>Filter Student Data using AJAX</title>

    <style>
        input {
            padding: 10px;
            width: 300px;
            margin-bottom: 20px;
        }

        table {
            width: 70%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Filter Students by Name</h2>

    <input type="text" id="searchBox" placeholder="Search student by name" onkeyup="filterStudents()">

    <div id="studentData"></div>

    <script>
        var allStudents = [];

        window.onload = function () {
            loadStudents();
        };

        function loadStudents() {
            var xhr = new XMLHttpRequest();

            xhr.open("GET", "students.json", true);

            xhr.onload = function () {
                if (xhr.status === 200) {
                    allStudents = JSON.parse(xhr.responseText);
                    displayStudents(allStudents);
                } else {
                    document.getElementById("studentData").innerHTML = "Error loading students.json file.";
                }
            };

            xhr.send();
        }

        function displayStudents(students) {
            var output = `
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Year</th>
                    </tr>
            `;

            for (var i = 0; i < students.length; i++) {
                output += `
                    <tr>
                        <td>${students[i].id}</td>
                        <td>${students[i].name}</td>
                        <td>${students[i].course}</td>
                        <td>${students[i].year}</td>
                    </tr>
                `;
            }

            output += "</table>";

            if (students.length === 0) {
                output = "<p>No student found.</p>";
            }

            document.getElementById("studentData").innerHTML = output;
        }

        function filterStudents() {
            var searchText = document.getElementById("searchBox").value.toLowerCase();

            var filteredStudents = allStudents.filter(function (student) {
                return student.name.toLowerCase().includes(searchText);
            });

            displayStudents(filteredStudents);
        }
    </script>

</body>
</html>
