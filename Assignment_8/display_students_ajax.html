<!DOCTYPE html>
<html>
<head>
    <title>Display JSON Data using AJAX</title>

    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Student Information</h2>

    <button onclick="loadStudents()">Load Students</button>

    <div id="studentData"></div>

    <script>
        function loadStudents() {
            var xhr = new XMLHttpRequest();

            xhr.open("GET", "students.json", true);

            xhr.onload = function () {
                if (xhr.status === 200) {
                    var students = JSON.parse(xhr.responseText);

                    var output = `
                        <table>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Course</th>
                                <th>Year</th>
                            </tr>
                    `;

                    for (var i = 0; i < students.length; i++) {
                        output += `
                            <tr>
                                <td>${students[i].id}</td>
                                <td>${students[i].name}</td>
                                <td>${students[i].course}</td>
                                <td>${students[i].year}</td>
                            </tr>
                        `;
                    }

                    output += "</table>";

                    document.getElementById("studentData").innerHTML = output;
                } else {
                    document.getElementById("studentData").innerHTML = "Error loading JSON file.";
                }
            };

            xhr.send();
        }
    </script>

</body>
</html>
