<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student AJAX PHP JSON System</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .container {
      width: 75%;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
    }

    h2, h3 {
      text-align: center;
      color: #2c3e50;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 15px;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1a252f;
    }

    .message {
      display: none;
      padding: 12px;
      margin-top: 15px;
      border-radius: 5px;
      font-weight: bold;
    }

    .success {
      background: #e8ffe8;
      color: #006400;
      border: 1px solid #77cc77;
    }

    .error {
      background: #ffecec;
      color: #b30000;
      border: 1px solid #ff9999;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f2f2f2;
    }

    .empty {
      text-align: center;
      color: #777;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Student Management System</h2>

    <form id="studentForm">
      <label>Student Name</label>
      <input type="text" id="name" name="name" placeholder="Enter student name">

      <label>Marks</label>
      <input type="number" id="marks" name="marks" placeholder="Enter marks">

      <button type="submit">Add Student</button>
    </form>

    <div id="messageBox" class="message"></div>

    <h3>Student List</h3>

    <table id="studentTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>

      <tbody id="studentData"></tbody>
    </table>

    <div id="emptyMessage" class="empty"></div>
  </div>

  <script>
    $(document).ready(function () {
      fetchStudents();

      $("#studentForm").submit(function (e) {
        e.preventDefault();

        let name = $("#name").val().trim();
        let marks = $("#marks").val().trim();

        if (name === "" || marks === "") {
          showMessage("Please enter both name and marks.", "error");
          return;
        }

        if (marks < 0 || marks > 100) {
          showMessage("Marks must be between 0 and 100.", "error");
          return;
        }

        $.ajax({
          url: "add_student.php",
          method: "POST",
          dataType: "json",
          data: {
            name: name,
            marks: marks
          },
          success: function (response) {
            if (response.status === "success") {
              showMessage(response.message, "success");
              $("#studentForm")[0].reset();
              displayStudents(response.students);
            } else {
              showMessage(response.message, "error");
            }
          },
          error: function () {
            showMessage("AJAX error while adding student.", "error");
          }
        });
      });
    });

    function fetchStudents() {
      $.ajax({
        url: "get_students.php",
        method: "GET",
        dataType: "json",
        success: function (response) {
          if (response.status === "success") {
            displayStudents(response.students);
          } else {
            showMessage(response.message, "error");
          }
        },
        error: function () {
          showMessage("AJAX error while fetching students.", "error");
        }
      });
    }

    function displayStudents(students) {
      let rows = "";

      if (students.length === 0) {
        $("#studentData").html("");
        $("#emptyMessage").text("No student records found.");
        return;
      }

      $("#emptyMessage").text("");

      students.forEach(function (student, index) {
        rows += `
          <tr>
            <td>${index + 1}</td>
            <td>${student.name}</td>
            <td>${student.marks}</td>
          </tr>
        `;
      });

      $("#studentData").html(rows);
    }

    function showMessage(message, type) {
      $("#messageBox")
        .removeClass("success error")
        .addClass(type)
        .text(message)
        .fadeIn();

      setTimeout(function () {
        $("#messageBox").fadeOut();
      }, 3000);
    }
  </script>

</body>
</html>
